name: Epic
description: Define a major body of design, research, or implementation work.
title: "EPIC: "
labels:
  - type: epic
body:
  - type: input
    id: epic-name
    attributes:
      label: Epic name
      description: Use the format EPIC followed by the system or initiative name.
      placeholder: "EPIC: Core Simulation Engine"
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What is this epic meant to accomplish?
      placeholder: "Define the central outcome this epic creates for Motocross: Chasing the Dream."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Explain the player, design, production, or technical reason this epic matters.
      placeholder: "Connect the epic to the game's design principles and long-term vision."
    validations:
      required: true
  - type: textarea
    id: systems
    attributes:
      label: Systems affected
      description: List game systems, docs, tooling, UI, or content areas affected.
      placeholder: "Memory Engine, Relationship Engine, Calendar & Time Engine"
    validations:
      required: true
  - type: textarea
    id: child-issues
    attributes:
      label: Child issues
      description: Link or list known child issues. Use task lists when possible.
      placeholder: "- [ ] #123 Define memory schema\n- [ ] #124 Design memory decay rules"
    validations:
      required: false
  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      description: What proves this epic is complete?
      placeholder: "Specs are approved, child issues are complete, and acceptance criteria are verified."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List prerequisite epics, design decisions, research, tools, or assets.
      placeholder: "Depends on Legacy Bible v1.0 and Core Engine Specs."
    validations:
      required: false
  - type: textarea
    id: open-questions
    attributes:
      label: Open questions
      description: Capture unknowns that must be resolved before or during the epic.
      placeholder: "What decisions can be deferred without blocking MVP?"
    validations:
      required: false
