name: Implementation task
description: Implement a scoped, approved change after research and design are ready.
title: "Implement: "
labels:
  - type: implementation
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: What context does an engineer or AI coding agent need before starting?
      placeholder: "Link the design issue, epic, and any relevant docs."
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: What must be built or changed?
      placeholder: "List clear, testable requirements."
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What behavior must be observable when this is done?
      placeholder: "Given/When/Then criteria or checklist items."
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Mention relevant files, patterns, constraints, and migration concerns.
      placeholder: "Use existing state management patterns; avoid gameplay scope creep."
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What must be completed or decided first?
      placeholder: "Requires approved design task #123."
    validations:
      required: false
  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: How should this change be tested?
      placeholder: "Unit tests, integration tests, manual flows, save/load checks."
    validations:
      required: true
  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      description: What proves this implementation task is complete?
      placeholder: "Code is merged, tests pass, docs are updated, and acceptance criteria are verified."
    validations:
      required: true
