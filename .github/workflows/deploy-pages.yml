name: Deploy to GitHub Pages

# Publishes the static prototype (repo root) to GitHub Pages.
# All asset paths in the app are relative, so it serves correctly from the
# project subpath (https://<user>.github.io/Motocross-Life-Simulator/).
#
# One-time setup: in the repo's Settings → Pages, set "Source" to
# "GitHub Actions". After that, every push to the default branch publishes,
# and you can also trigger this manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site (index.html + src/ + styles.css).
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
