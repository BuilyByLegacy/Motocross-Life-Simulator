name: Create GitHub issues from prompt

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Paste issue text, Markdown issue drafts, or JSON exported from ChatGPT.'
        required: true
        type: string
      dry_run:
        description: 'Preview parsed issues without creating them.'
        required: true
        default: true
        type: boolean
      max_issues:
        description: 'Maximum number of issues to create from the prompt.'
        required: true
        default: '10'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '15'
          - '20'

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    name: Create issues
    runs-on: ubuntu-latest
    steps:
      - name: Parse prompt and create GitHub issues
        uses: actions/github-script@v7
        env:
          PROMPT: ${{ inputs.prompt }}
          DRY_RUN: ${{ inputs.dry_run }}
          MAX_ISSUES: ${{ inputs.max_issues }}
        with:
          script: |
            const dryRun = process.env.DRY_RUN === 'true';
            const maxIssues = Number.parseInt(process.env.MAX_ISSUES || '10', 10);
            const userPrompt = (process.env.PROMPT || '').trim();

            if (!userPrompt) {
              throw new Error('The prompt input is empty. Paste issue text, Markdown issue drafts, or issue JSON.');
            }

            function cleanTitle(value) {
              return String(value || '')
                .replace(/^#+\s*/, '')
                .replace(/^Issue:\s*/i, '')
                .trim();
            }

            function normalizeLabels(labels) {
              if (Array.isArray(labels)) {
                return labels
                  .filter((label) => typeof label === 'string' && label.trim())
                  .map((label) => label.trim());
              }

              if (typeof labels === 'string') {
                return labels
                  .split(',')
                  .map((label) => label.trim())
                  .filter(Boolean);
              }

              return [];
            }

            function normalizeIssue(issue) {
              const title = cleanTitle(issue.title || issue.name || issue.heading);
              const body = String(issue.body || issue.description || issue.content || '').trim();
              return {
                title,
                body,
                labels: normalizeLabels(issue.labels)
              };
            }

            function parseJsonIssues(text) {
              const jsonText = text
                .replace(/^```(?:json)?\s*/i, '')
                .replace(/\s*```$/i, '')
                .trim();

              try {
                const parsed = JSON.parse(jsonText);
                const issues = Array.isArray(parsed) ? parsed : parsed.issues;
                return Array.isArray(issues) ? issues.map(normalizeIssue) : [];
              } catch {
                return [];
              }
            }

            function parseMarkdownIssues(text) {
              const headingPattern = /^#{1,3}\s+Issue:\s+(.+)$/gim;
              const matches = [...text.matchAll(headingPattern)];

              if (matches.length === 0) {
                return [];
              }

              return matches.map((match, index) => {
                const bodyStart = match.index + match[0].length;
                const nextMatch = matches[index + 1];
                const bodyEnd = nextMatch ? nextMatch.index : text.length;
                const body = text.slice(bodyStart, bodyEnd).trim();
                const labelsMatch = body.match(/^Labels:\s*(.+)$/im);

                return {
                  title: cleanTitle(match[1]),
                  body,
                  labels: labelsMatch ? normalizeLabels(labelsMatch[1]) : []
                };
              });
            }

            function parseSingleIssue(text) {
              const lines = text.split(/\r?\n/);
              const firstContentLine = lines.find((line) => line.trim());
              const title = cleanTitle(firstContentLine || 'New issue from prompt');

              return [{
                title: title.slice(0, 256),
                body: text,
                labels: []
              }];
            }

            const issues = [
              ...parseJsonIssues(userPrompt),
              ...parseMarkdownIssues(userPrompt)
            ].filter((issue) => issue.title && issue.body);

            const parsedIssues = (issues.length ? issues : parseSingleIssue(userPrompt)).slice(0, maxIssues);

            if (parsedIssues.length === 0) {
              throw new Error('No valid issues were found. Provide JSON with an issues array, Markdown headings like "# Issue: Title", or plain issue text.');
            }

            core.summary.addHeading(dryRun ? 'Parsed issue preview' : 'Created GitHub issues');

            for (const issue of parsedIssues) {
              if (dryRun) {
                core.info(`[dry-run] Would create issue: ${issue.title}`);
                core.summary
                  .addRaw(`### ${issue.title}\n\n`)
                  .addRaw(`${issue.body}\n\n`)
                  .addRaw(issue.labels.length ? `Labels: ${issue.labels.join(', ')}\n\n` : 'Labels: _none_\n\n');
                continue;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels
              });

              core.info(`Created issue #${created.data.number}: ${created.data.html_url}`);
              core.summary.addRaw(`- #${created.data.number}: [${issue.title}](${created.data.html_url})\n`);
            }

            await core.summary.write();
