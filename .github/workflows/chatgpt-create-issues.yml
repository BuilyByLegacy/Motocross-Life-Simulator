name: Create GitHub issues from ChatGPT prompt

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Describe the work you want converted into GitHub issues.'
        required: true
        type: string
      model:
        description: 'OpenAI model to use for issue drafting.'
        required: true
        default: 'gpt-4.1-mini'
        type: string
      dry_run:
        description: 'Preview generated issues without creating them.'
        required: true
        default: true
        type: boolean
      max_issues:
        description: 'Maximum number of issues to create.'
        required: true
        default: '10'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
          - '10'
          - '15'
          - '20'

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    name: Generate and create issues
    runs-on: ubuntu-latest
    steps:
      - name: Generate issues with ChatGPT and create them in GitHub
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          OPENAI_MODEL: ${{ inputs.model }}
          DRY_RUN: ${{ inputs.dry_run }}
          MAX_ISSUES: ${{ inputs.max_issues }}
        with:
          script: |
            const apiKey = process.env.OPENAI_API_KEY;
            if (!apiKey) {
              throw new Error('Missing OPENAI_API_KEY repository secret.');
            }

            const dryRun = process.env.DRY_RUN === 'true';
            const maxIssues = Number.parseInt(process.env.MAX_ISSUES || '10', 10);
            const userPrompt = process.env.PROMPT || '';
            const model = process.env.OPENAI_MODEL || 'gpt-4.1-mini';

            const systemPrompt = [
              'You turn product or engineering requests into concise GitHub issues.',
              'Return only valid JSON with this exact shape:',
              '{',
              '  "issues": [',
              '    {',
              '      "title": "Short actionable issue title",',
              '      "body": "Markdown issue body with context, proposed work, and acceptance criteria",',
              '      "labels": ["optional-label"]',
              '    }',
              '  ]',
              '}',
              'Rules:',
              `- Create between 1 and ${maxIssues} issues.`,
              '- Keep every issue independently actionable.',
              '- Use labels only when they are generic and likely to exist, such as bug, enhancement, documentation, or chore.',
              '- Do not include assignees, milestones, projects, or any text outside JSON.'
            ].join('\n');

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model,
                temperature: 0.2,
                messages: [
                  { role: 'system', content: systemPrompt },
                  { role: 'user', content: userPrompt }
                ]
              })
            });

            const rawResponse = await response.text();
            if (!response.ok) {
              throw new Error(`OpenAI request failed with HTTP ${response.status}: ${rawResponse}`);
            }

            const completion = JSON.parse(rawResponse);
            const content = completion.choices?.[0]?.message?.content?.trim();
            if (!content) {
              throw new Error('OpenAI response did not include message content.');
            }

            const jsonText = content
              .replace(/^```(?:json)?\s*/i, '')
              .replace(/\s*```$/i, '')
              .trim();

            let parsed;
            try {
              parsed = JSON.parse(jsonText);
            } catch (error) {
              core.error(content);
              throw new Error(`OpenAI response was not valid JSON: ${error.message}`);
            }

            const issues = Array.isArray(parsed.issues) ? parsed.issues.slice(0, maxIssues) : [];
            if (issues.length === 0) {
              throw new Error('OpenAI response did not include any issues.');
            }

            core.summary.addHeading(dryRun ? 'Generated issue preview' : 'Created GitHub issues');

            for (const issue of issues) {
              if (!issue.title || !issue.body) {
                throw new Error(`Each issue must include a title and body. Invalid issue: ${JSON.stringify(issue)}`);
              }

              const labels = Array.isArray(issue.labels)
                ? issue.labels.filter((label) => typeof label === 'string' && label.trim()).map((label) => label.trim())
                : [];

              if (dryRun) {
                core.info(`[dry-run] Would create issue: ${issue.title}`);
                core.summary
                  .addRaw(`### ${issue.title}\n\n`)
                  .addRaw(`${issue.body}\n\n`)
                  .addRaw(labels.length ? `Labels: ${labels.join(', ')}\n\n` : 'Labels: _none_\n\n');
                continue;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels
              });

              core.info(`Created issue #${created.data.number}: ${created.data.html_url}`);
              core.summary.addRaw(`- #${created.data.number}: [${issue.title}](${created.data.html_url})\n`);
            }

            await core.summary.write();
